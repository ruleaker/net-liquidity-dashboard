name: Update dashboard

on:
  schedule:
    # 22:00 UTC daily — after the Fed H.4.1 release window (Thursdays ~16:30 ET / 21:30 UTC)
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update.py
        run: python update.py

      - name: Commit and push if changed
        run: |
          git config user.name  "ruleaker"
          git config user.email "ruleaker@yeah.net"
          git add charts/ latest.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          stamp=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "chore: refresh dashboard (${stamp})"
          git push
